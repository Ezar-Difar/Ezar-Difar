<svg xmlns="http://www.w3.org/2000/svg" width="800" height="250" viewBox="0 0 800 250">
  <style>
    <![CDATA[
    .bg { fill: #0D0D11; }
    
    .grid { stroke: #1A1A24; stroke-width: 1; stroke-dasharray: 4 4; }

    .terminal-text {
      font-family: Consolas, "Courier New", monospace;
      font-weight: bold;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    
    .cyber-text {
      font-family: Impact, "Arial Black", sans-serif;
      font-style: italic;
      letter-spacing: 4px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .cyan-neon {
      fill: #00FFFC;
      filter: drop-shadow(0 0 5px #00FFFC);
    }
    
    .magenta-neon {
      fill: #FF00A0;
      filter: drop-shadow(0 0 5px #FF00A0);
    }

    @keyframes sysBlink {
      0%, 8%, 16% { opacity: 1; }
      4%, 12%, 20% { opacity: 0; }
      24%, 100% { opacity: 0; }
    }

    @keyframes appearAndGlitch {
      0%, 23% { opacity: 0; transform: scale(0.95); filter: none; }
      26%, 85% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 5px #FF00A0); }
      86% { transform: translate(-3px, 1px) skewX(2deg); filter: drop-shadow(-4px 0 0 #00FFFC) drop-shadow(4px 0 0 #FF00A0); }
      88% { transform: translate(3px, -1px) skewX(-2deg); filter: drop-shadow(4px 0 0 #00FFFC) drop-shadow(-4px 0 0 #FF00A0); }
      90% { transform: translate(0) skewX(0); filter: drop-shadow(0 0 5px #FF00A0); }
      98%, 100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 5px #FF00A0); }
    }

    @keyframes appearAndGlitchSub {
      0%, 26% { opacity: 0; transform: translateY(10px); filter: none; }
      30%, 86% { opacity: 1; transform: translateY(0); filter: drop-shadow(0 0 4px #00FFFC); }
      87% { transform: translate(2px, 0); filter: drop-shadow(-3px 0 0 #FF00A0) drop-shadow(3px 0 0 #00FFFC); }
      89% { transform: translate(-2px, 0); filter: drop-shadow(3px 0 0 #FF00A0) drop-shadow(-3px 0 0 #00FFFC); }
      91% { transform: translate(0); filter: drop-shadow(0 0 4px #00FFFC); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .t-system { font-size: 32px; animation: sysBlink 9s infinite; }
    .t-nama { font-size: 60px; animation: appearAndGlitch 9s infinite; opacity: 0; }
    .t-dev { font-size: 22px; letter-spacing: 2px; animation: appearAndGlitchSub 9s infinite; opacity: 0; }
    ]]>
  </style>

  <rect width="100%" height="100%" class="bg" />
  <line x1="0" y1="20" x2="800" y2="20" class="grid" />
  <line x1="0" y1="230" x2="800" y2="230" class="grid" />

  <text x="50%" y="50%" class="terminal-text t-system cyan-neon">&gt;_SYSTEM ONLINE...</text>
  <text x="50%" y="45%" class="cyber-text t-nama magenta-neon">Wake UP Programmer!</text>
  <text x="50%" y="70%" class="terminal-text t-dev cyan-neon">We have a device to burn...</text>
</svg>
